spring:
  application:
    name: trading_grid

  datasource:
    url: jdbc:h2:mem:trading_grid_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  web:
    client:
      binance:
        base-url: https://api.binance.com
        api-key: YOUR_BINANCE_API_KEY
        api-secret: YOUR_BINANCE_API_SECRET

trading-grid:
  historical-data:
    download:
      page-size: 1000
      throttle-ms: 250
      storage-dir: historical-data
